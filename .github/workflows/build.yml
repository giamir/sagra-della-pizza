name: Build installers

on:
  # Run when you push a version tag: git tag v1.0.0 && git push --tags
  push:
    tags:
      - 'v*'
  # Also runnable manually from the GitHub Actions tab
  workflow_dispatch:

jobs:

  build-mac:
    name: macOS (DMG)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Prepare SvelteKit config
        run: npx svelte-kit sync

      - name: Rebuild better-sqlite3 for Electron (macOS)
        working-directory: apps/desktop
        run: npm run postinstall

      - name: Build and package (macOS)
        working-directory: apps/desktop
        run: npm run package:mac

      - name: Upload update artifacts (macOS)
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: node tools/desktop-updates/upload-to-vercel-blob.mjs apps/desktop/dist

  build-win:
    name: Windows (NSIS)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare SvelteKit config
        run: npx svelte-kit sync

      - name: Rebuild better-sqlite3 for Electron (Windows)
        working-directory: apps/desktop
        run: npm run postinstall

      - name: Build and package (Windows)
        working-directory: apps/desktop
        run: npm run package:win

      - name: Upload update artifacts (Windows)
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: node tools/desktop-updates/upload-to-vercel-blob.mjs apps/desktop/dist
