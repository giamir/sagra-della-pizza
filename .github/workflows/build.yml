name: Build installers

on:
  # Run when you push a version tag: git tag v1.0.0 && git push --tags
  push:
    tags:
      - 'v*'
  # Also runnable manually from the GitHub Actions tab
  workflow_dispatch:

# Each platform builds once per tenant. The tenant overlay (use-tenant) brands
# the app icon, productName and update feed URL; the matching Blob token routes
# the artifacts to that tenant's store, which its /download page reads.
jobs:

  build-mac:
    name: macOS (DMG) — ${{ matrix.tenant }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - tenant: sagra-della-pizza
            blob_secret: BLOB_READ_WRITE_TOKEN
          - tenant: sorsi-e-morsi
            blob_secret: BLOB_READ_WRITE_TOKEN_SORSI
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      # Brand this build for the tenant: tenant.json/menu.json + desktop icons
      # (apps/desktop/resources) drive productName, appId and the update feed.
      - name: Activate tenant
        run: npm run use-tenant ${{ matrix.tenant }}

      - name: Prepare SvelteKit config
        run: npx svelte-kit sync

      - name: Rebuild better-sqlite3 for Electron (macOS)
        working-directory: apps/desktop
        run: npm run postinstall

      # Keep build and package as SEPARATE steps: chaining them with && lets
      # a .cmd shim short-circuit the rest of the line on Windows (and pwsh's
      # $? can short-circuit too), silently skipping electron-builder.
      - name: Build renderer (macOS)
        working-directory: apps/desktop
        run: npx electron-vite build

      # Invoke electron-builder directly via node: npx electron-builder is a
      # silent no-op on the Windows runner, so avoid npx and the .cmd shim.
      - name: Package (macOS)
        working-directory: apps/desktop
        run: node ../../node_modules/electron-builder/cli.js --mac --publish never

      - name: Upload update artifacts (macOS)
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets[matrix.blob_secret] }}
        run: node tools/desktop-updates/upload-to-vercel-blob.mjs apps/desktop/dist

  build-win:
    name: Windows (NSIS) — ${{ matrix.tenant }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - tenant: sagra-della-pizza
            blob_secret: BLOB_READ_WRITE_TOKEN
          - tenant: sorsi-e-morsi
            blob_secret: BLOB_READ_WRITE_TOKEN_SORSI
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Activate tenant
        run: npm run use-tenant ${{ matrix.tenant }}

      - name: Prepare SvelteKit config
        run: npx svelte-kit sync

      - name: Rebuild better-sqlite3 for Electron (Windows)
        working-directory: apps/desktop
        run: npm run postinstall

      - name: Build renderer (Windows)
        working-directory: apps/desktop
        run: npx electron-vite build

      - name: Package (Windows)
        working-directory: apps/desktop
        run: node ../../node_modules/electron-builder/cli.js --win --publish never

      - name: Upload update artifacts (Windows)
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets[matrix.blob_secret] }}
        run: node tools/desktop-updates/upload-to-vercel-blob.mjs apps/desktop/dist

  build-win7:
    name: Windows 7 (legacy, Electron 22) — ${{ matrix.tenant }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - tenant: sagra-della-pizza
            blob_secret: BLOB_READ_WRITE_TOKEN
          - tenant: sorsi-e-morsi
            blob_secret: BLOB_READ_WRITE_TOKEN_SORSI
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Pin the desktop app to the last Electron that supports Windows 7/8/8.1
      # and a better-sqlite3 that still builds against its Node 16 ABI. These
      # edits are CI-only (not committed) — the default build stays on Electron 35.
      - name: Pin Electron 22 + compatible better-sqlite3
        working-directory: apps/desktop
        run: |
          npm pkg set devDependencies.electron=22.3.27
          npm pkg set dependencies.better-sqlite3=8.7.0

      - name: Install dependencies
        run: npm install

      - name: Activate tenant
        run: npm run use-tenant ${{ matrix.tenant }}

      - name: Prepare SvelteKit config
        run: npx svelte-kit sync

      # Rebuilds better-sqlite3 from source against the pinned Electron 22 ABI.
      - name: Rebuild better-sqlite3 for Electron (Windows 7)
        working-directory: apps/desktop
        run: npm run postinstall

      - name: Build renderer (Windows 7)
        working-directory: apps/desktop
        env:
          SAGRA_UPDATE_CHANNEL: win7-latest
        run: npx electron-vite build

      - name: Package (Windows 7)
        working-directory: apps/desktop
        run: node ../../node_modules/electron-builder/cli.js --win --config electron-builder.legacy.js --publish never

      - name: Upload update artifacts (Windows 7)
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets[matrix.blob_secret] }}
        run: node tools/desktop-updates/upload-to-vercel-blob.mjs apps/desktop/dist
