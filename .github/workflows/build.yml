name: Build installers

on:
  # Run when you push a version tag: git tag v1.0.0 && git push --tags
  push:
    tags:
      - 'v*'
  # Also runnable manually from the GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:

  build-mac:
    name: macOS (DMG)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare SvelteKit config
        run: npx svelte-kit sync

      - name: Rebuild better-sqlite3 for Electron (macOS)
        working-directory: apps/desktop
        run: npm run postinstall

      - name: Build and package (macOS)
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-vite build && npx electron-builder --mac --publish always

  build-win:
    name: Windows (NSIS)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare SvelteKit config
        run: npx svelte-kit sync

      - name: Rebuild better-sqlite3 for Electron (Windows)
        working-directory: apps/desktop
        run: npm run postinstall

      - name: Build and package (Windows)
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-vite build && npx electron-builder --win --publish always
