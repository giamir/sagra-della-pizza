name: Deploy tenants to Vercel

on:
  # Production deploy when main moves
  push:
    branches:
      - main
  # Manual deploy from the Actions tab (optionally a single tenant)
  workflow_dispatch:
    inputs:
      tenant:
        description: 'Deploy only this tenant (blank = all)'
        required: false
        default: ''

# One in-flight deploy run per ref; queued runs don't pile up.
concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Build the (optionally filtered) tenant matrix, carrying each tenant's
  # Vercel project ID. A job-level matrix can't be filtered by an input, so we
  # compute it here and feed it to the deploy job via fromJSON.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        env:
          SELECTED: ${{ github.event.inputs.tenant }}
          SAGRA_ID: ${{ vars.VERCEL_PROJECT_ID_SAGRA }}
          SORSI_ID: ${{ vars.VERCEL_PROJECT_ID_SORSI }}
        run: |
          all=$(jq -c -n --arg sagra "$SAGRA_ID" --arg sorsi "$SORSI_ID" '[
            {tenant:"sagra-della-pizza", project_id:$sagra},
            {tenant:"sorsi-e-morsi",     project_id:$sorsi}
          ]')
          if [ -n "$SELECTED" ]; then
            all=$(echo "$all" | jq -c --arg t "$SELECTED" '[.[] | select(.tenant==$t)]')
          fi
          echo "matrix={\"include\":$all}" >> "$GITHUB_OUTPUT"

  deploy:
    needs: prepare
    name: ${{ matrix.tenant }}
    runs-on: ubuntu-latest
    strategy:
      # Deploy every tenant even if one fails.
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    env:
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ matrix.project_id }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Overlay this tenant's config/menu/assets onto the active files
      # (shared/src/config/tenant.json, menu.json, static/*) before building.
      - name: Activate tenant
        run: npm run use-tenant ${{ matrix.tenant }}

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      # Writes .vercel/project.json from VERCEL_ORG_ID + VERCEL_PROJECT_ID and
      # pulls the project's production env/settings.
      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build (Vercel, prebuilt)
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
